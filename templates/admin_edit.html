{% extends "base.html" %}
{% block title %}Редактирование пациента — ЗдравГарант{% endblock %}

{% block content %}
<h1 class="page-title">Редактирование пациента</h1>
<p class="page-subtitle">{{ patient.id }} — {{ patient.full_name }}</p>

<form class="auth-form" style="max-width:480px;"
      action="{{ url_for('admin_edit', patient_id=patient.id) }}"
      data-http-method="PUT">
    <div class="form-group">
        <label class="form-label">Фамилия *</label>
        <input type="text" name="last_name" class="form-input"
               value="{{ patient.last_name }}" required>
    </div>
    <div class="form-group">
        <label class="form-label">Имя *</label>
        <input type="text" name="first_name" class="form-input"
               value="{{ patient.first_name }}" required>
    </div>
    <div class="form-group">
        <label class="form-label">Отчество</label>
        <input type="text" name="middle_name" class="form-input"
               value="{{ patient.middle_name }}">
    </div>
    <div class="form-group">
        <label class="form-label">Возраст *</label>
        <input type="number" name="age" class="form-input"
               value="{{ patient.age }}" min="1" required>
    </div>
    <div class="form-group">
        <label class="form-label">Email *</label>
        <input type="email" name="email" class="form-input"
               value="{{ patient.email }}" required>
    </div>
    <div class="form-group">
        <label class="form-label">Роль</label>
        <select name="role" class="form-input">
            <option value="user" {% if patient.role|default('user') == 'user' %}selected{% endif %}>user</option>
            <option value="admin" {% if patient.role|default('user') == 'admin' %}selected{% endif %}>admin</option>
        </select>
    </div>
    <div class="form-group">
        <label class="form-label">Новый пароль (оставьте пустым, чтобы не менять)</label>
        <div class="password-wrapper">
            <input type="password" name="password" class="form-input">
            <button type="button" class="password-toggle" tabindex="-1">
                <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
        </div>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Сохранить</button>
    <a href="{{ url_for('admin') }}" class="btn btn-outline" style="width:100%;margin-top:8px;text-align:center;">Назад к списку</a>
</form>
{% endblock %}
