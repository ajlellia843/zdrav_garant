{% extends "base.html" %}
{% block title %}Вход — ЗдравГарант{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <a href="{{ url_for('index') }}" class="auth-back-link">&larr; На главную</a>
    <div class="auth-card">
        <div class="auth-title">ЗдравГарант</div>
        <div class="auth-subtitle">Вход в систему управления пациентами</div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label">Идентификатор пациента</label>
                <input type="text" name="login" class="form-input"
                       placeholder="PG-XXXXX или email">
            </div>
            <div class="form-group">
                <label class="form-label">Пароль доступа</label>
                <div class="password-wrapper">
                    <input type="password" name="password" class="form-input"
                           placeholder="••••••••">
                    <button type="button" class="password-toggle" tabindex="-1">
                        <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">
                Войти в систему
            </button>
        </form>
        <div class="auth-link">
            Нет аккаунта? <a href="{{ url_for('register') }}">Регистрация</a>
        </div>
    </div>
</div>
{% endblock %}
